name: Frontend CI

on:
  pull_request:
    branches: [main, production]
    paths:
      - 'src/**'
      - 'server.js'
      - 'package.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'tailwind.config.js'
      - '.github/workflows/**'
  push:
    branches: [main]

jobs:
  lint-typecheck-build:
    name: Lint → Type-check → Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  docker-build:
    name: Docker build test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint-typecheck-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ai-visibility-frontend:ci-test .
